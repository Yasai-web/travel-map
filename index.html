<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪問した場所マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --ink: #1f2421;
    --paper: #f7f5ef;
    --line: #e0ddd2;
    --muted: #6f6d63;
    --accent: #2f6f5e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: var(--ink);
    background: var(--paper);
  }
  #app { display: flex; flex-direction: column; height: 100%; }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }

  .zoom-buttons { display: flex; gap: 8px; }
  .zoom-buttons button {
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 7px 16px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .zoom-buttons button:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-buttons button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  #map { flex: 1; background: #e8e6df; }

  .legend {
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .legend .legend-title { font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .legend .row { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  .legend .row.off { opacity: 0.35; }
  .legend .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); flex: none; }

  .popup-name { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
  .popup-meta { font-size: 12px; color: var(--muted); margin: 0 0 2px; }
  .popup-memo { font-size: 12px; margin: 6px 0 0; color: var(--ink); }
  .popup-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .popup-link:hover { text-decoration: underline; }
  .leaflet-popup-content { margin: 12px 14px; }

  .banner {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    max-width: 90%;
    background: #fff8e6;
    border: 1px solid #e6d28a;
    color: #6a5a1e;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .banner code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>訪問した<span>場所</span>マップ</h1>
    <div class="zoom-buttons">
      <button data-area="world">世界</button>
      <button data-area="japan">日本</button>
      <button data-area="tokyo">東京</button>
    </div>
    <div class="count" id="count"></div>
  </header>
  <div id="map"></div>
</div>

<script>
// ===== 設定 =====================================================
// エリアボタンを押したときの表示範囲（緯度・経度・ズーム）
const AREA_VIEWS = {
  world: { center: [20, 10],        zoom: 2  },
  japan: { center: [37.5, 137.5],   zoom: 5  },
  tokyo: { center: [35.685, 139.75], zoom: 12 },
};

// カテゴリに割り当てる色（出てきた順にこの並びから使う）
const COLOR_PALETTE = [
  '#2f6f5e', // 緑
  '#c4622d', // オレンジ
  '#3a6ea5', // 青
  '#9c4f96', // 紫
  '#b0892a', // 黄土
  '#7a8a3a', // 黄緑
  '#a8434a', // 赤
  '#4a4a4a', // グレー
];

// 初期表示エリア
const INITIAL_AREA = 'tokyo';
// ===============================================================

const map = L.map('map', { zoomControl: true })
  .setView(AREA_VIEWS[INITIAL_AREA].center, AREA_VIEWS[INITIAL_AREA].zoom);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

// エリアボタン
document.querySelectorAll('.zoom-buttons button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = AREA_VIEWS[btn.dataset.area];
    map.flyTo(v.center, v.zoom, { duration: 1.0 });
  });
});

// カテゴリ→色 の対応を管理
const categoryColors = {};
function colorFor(category) {
  if (!(category in categoryColors)) {
    const i = Object.keys(categoryColors).length % COLOR_PALETTE.length;
    categoryColors[category] = COLOR_PALETTE[i];
  }
  return categoryColors[category];
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// カテゴリごとにレイヤーをまとめる（凡例での表示切替に使う）
const layersByCategory = {};
const allMarkers = [];

function addPlace(p) {
  const lat = parseFloat(p.lat), lng = parseFloat(p.lng);
  if (Number.isNaN(lat) || Number.isNaN(lng)) return;
  const category = (p.category || '未分類').trim();
  const color = colorFor(category);

  const marker = L.circleMarker([lat, lng], {
    radius: 8,
    color: '#fff',
    weight: 2,
    fillColor: color,
    fillOpacity: 1,
  });

  const meta = [category, p.date].filter(Boolean).map(escapeHtml).join('　・　');
  let html = `<p class="popup-name">${escapeHtml(p.name)}</p>`;
  if (meta) html += `<p class="popup-meta">${meta}</p>`;
  if (p.memo) html += `<p class="popup-memo">${escapeHtml(p.memo)}</p>`;
  if (p.url) html += `<a class="popup-link" href="${escapeHtml(p.url)}" target="_blank" rel="noopener">リンクを開く →</a>`;
  marker.bindPopup(html);

  if (!layersByCategory[category]) layersByCategory[category] = L.layerGroup().addTo(map);
  marker.addTo(layersByCategory[category]);
  allMarkers.push(marker);
}

function buildLegend() {
  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'legend');
    L.DomEvent.disableClickPropagation(div);
    let html = '<div class="legend-title">カテゴリ</div>';
    for (const cat of Object.keys(categoryColors)) {
      html += `<div class="row" data-cat="${escapeHtml(cat)}">
        <span class="dot" style="background:${categoryColors[cat]}"></span>${escapeHtml(cat)}</div>`;
    }
    div.innerHTML = html;
    div.querySelectorAll('.row').forEach(row => {
      row.addEventListener('click', () => {
        const cat = row.dataset.cat;
        const layer = layersByCategory[cat];
        if (map.hasLayer(layer)) { map.removeLayer(layer); row.classList.add('off'); }
        else { map.addLayer(layer); row.classList.remove('off'); }
      });
    });
    return div;
  };
  legend.addTo(map);
}

function showBanner(msg) {
  const b = document.createElement('div');
  b.className = 'banner';
  b.innerHTML = msg;
  document.getElementById('app').appendChild(b);
}

function finish() {
  buildLegend();
  document.getElementById('count').textContent = `${allMarkers.length} 件の場所`;
}

// 組み込みのサンプル（places.csv が読めない環境＝file:// で開いたときの予備）
const FALLBACK = [
  { name:'東京スカイツリー', lat:35.7101, lng:139.8107, category:'旅行', url:'https://www.tokyo-skytree.jp/', date:'2025-04-12', area:'tokyo', memo:'夜景がきれい' },
  { name:'上野動物園', lat:35.7166, lng:139.7714, category:'子育て', url:'https://www.tokyo-zoo.net/zoo/ueno/', date:'2025-05-03', area:'tokyo', memo:'パンダ目当て' },
  { name:'明治神宮', lat:35.6764, lng:139.6993, category:'趣味', url:'https://www.meijijingu.or.jp/', date:'2025-03-20', area:'tokyo', memo:'朝の散歩コース' },
];

// places.csv を読み込む
Papa.parse('places.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: (res) => {
    if (!res.data || res.data.length === 0) {
      FALLBACK.forEach(addPlace);
      showBanner('places.csv が空のようです。組み込みのサンプルを表示しています。');
    } else {
      res.data.forEach(addPlace);
    }
    finish();
  },
  error: () => {
    FALLBACK.forEach(addPlace);
    finish();
    showBanner(
      'ファイルを直接開いた状態では <code>places.csv</code> を読み込めないため、組み込みのサンプルを表示しています。<br>' +
      '実際のデータを反映するには、GitHub Pages に公開するか、フォルダ内で <code>python -m http.server</code> を実行して <code>http://localhost:8000</code> を開いてください。'
    );
  },
});
</script>
</body>
</html>
